services:
  nginx:
    image: nginx:alpine
    container_name: openhands-nginx
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - openhands
    restart: unless-stopped

  openhands:
    image: ghcr.io/openhands/openhands:1.5.0
    container_name: openhands-app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SANDBOX_CONTAINER_URL_PATTERN=http://192.168.31.51:3000/agentproxy/{port}
      # PyInstaller extraction takes ~13s + app init ~4s = ~17s, exceeds default 15s grace
      - SANDBOX_STARTUP_GRACE_SECONDS=120
      - AGENT_SERVER_IMAGE_REPOSITORY=openhands-dotnet
      - AGENT_SERVER_IMAGE_TAG=latest
      - SANDBOX_BASE_CONTAINER_IMAGE=openhands-dotnet:latest
      # SANDBOX_USE_HOST_NETWORK removed: host network causes all sandbox containers
      # to fight for port 8000, new containers crash (exit 1), and openhands-app
      # sends wrong session_api_key to the old container → 401 Unauthorized.
    ports:
      - "3001:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
    stdin_open: true
    tty: true
    restart: unless-stopped
